name: Expressions quotidiennes

on:
  schedule:
    # 06:00 UTC = 8h00 Paris (heure d'été) / 7h00 Paris (heure d'hiver)
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # permet de lancer à la main depuis l'onglet Actions

permissions:
  contents: write

jobs:
  generer:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le repo
        uses: actions/checkout@v4

      - name: Installer Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Générer 4 expressions via OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5.4
        run: node scripts/generer-openai.mjs --n 4

      - name: Commit & push si changement
        run: |
          if ! git diff --quiet -- expressions.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add expressions.json
            git commit -m "routine: 4 expressions du $(date '+%Y-%m-%d')"
            git push
          else
            echo "Aucune nouvelle expression à committer."
          fi
